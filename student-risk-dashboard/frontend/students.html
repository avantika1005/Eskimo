<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student List - AI Early Warning System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="index.css">
<script src="students.js" defer></script>
</head>
<body class="bg-gradient-to-b from-purple-900 to-purple-300 min-h-screen text-white font-sans">

<header class="p-6 bg-opacity-40 relative">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-0">
        <div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tighter">STUDENT RISK LIST</h1>
            <p class="text-purple-200 mt-2 font-extrabold italic">KANCHIPURAM GOVERNMENT MATRIC.HR.SEC.SCHOOL</p>
        </div>
        <div>
            <a href="index.html" class="bg-purple-800 hover:bg-purple-900 text-white font-black px-5 py-3 rounded-xl shadow-lg transform hover:scale-105 transition-all flex items-center gap-2 text-sm md:text-base">
                🏠 Dashboard
            </a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-purple-700 text-black">
        <div class="p-8">
            <h2 class="text-2xl font-black mb-6 text-purple-950 uppercase tracking-tight">Processed Student Records</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-purple-100">
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">ID</th>
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">Name</th>
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">Grade</th>
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">Risk Level</th>
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">Score</th>
                            <th class="py-4 px-4 font-black text-purple-900 uppercase text-sm">Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <!-- Data will be injected here -->
                        <tr>
                            <td colspan="6" class="py-8 text-center text-gray-500 font-bold italic">Loading student data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="w-full text-center p-6 mt-12 bg-slate-950 text-slate-200 font-bold tracking-widest uppercase text-sm">
    KMHSC • 2026 © Only For Educational Purpose
</footer>

</body>
</html>
